name: Get the hash of the lastest commit in KeyTao
on:
    workflow_dispatch
jobs:
    my-caller-job:
        uses: ./.github/workflows/get-latest-commit-hash.yml
        with:
            url: 'https://github.com/xkinput/KeyTao.git'
            branch: master
    my-job:
        runs-on: ubuntu-latest
        needs: my-caller-job
        steps:
            - run: |
                echo "${{ needs.my-caller-job.outputs.return }}"
                echo $GITHUB_WORKSPACE
                echo ~